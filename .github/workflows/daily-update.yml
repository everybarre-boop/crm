# ============================================================================
# 에블바레 — 일간 회원 사용횟수 자동 갱신
# ----------------------------------------------------------------------------
# 스튜디오메이트 당일 예약자의 전체/잔여를 스크랩해 members 에 반영한다.
# PC 가 꺼져 있어도 GitHub 클라우드에서 매일 실행된다.
#
# 보안: service_role 키를 쓰지 않는다. 관리자 계정으로 로그인해 RLS 안에서 동작한다.
#       비밀값은 저장소가 아니라 GitHub → Settings → Secrets and variables → Actions 에 둔다.
#
# 필요한 Secrets:
#   SUPABASE_URL, SUPABASE_ANON_KEY   (공개값이지만 Secrets 로 주입)
#   ADMIN_EMAIL, ADMIN_PASSWORD       (관리자 계정 — 비밀)
#   STUDIOMATE_EMAIL, STUDIOMATE_PASSWORD
#   SM_SLUG_GWANGGYO 등 지점별 slug (필요 시)
#
# ⚠️ 처음엔 아래 schedule 을 주석 유지하고 workflow_dispatch(수동)로 DRY_RUN=true 며칠
#    돌려 미매칭 로그를 확인한 뒤, 안정되면 schedule 주석을 풀고 DRY_RUN 을 false 로.
# ============================================================================
name: daily-update

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '반영 없이 매칭만 확인(dry-run)'
        type: boolean
        default: true
  # schedule:
  #   - cron: '0 14 * * *'   # UTC 14:00 = KST 23:00 (당일 수업 종료 후). 검증 끝난 뒤 주석 해제.

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      STUDIOMATE_EMAIL: ${{ secrets.STUDIOMATE_EMAIL }}
      STUDIOMATE_PASSWORD: ${{ secrets.STUDIOMATE_PASSWORD }}
      SM_SLUG_CHEONGDAM: ${{ secrets.SM_SLUG_CHEONGDAM }}
      SM_SLUG_OKSU: ${{ secrets.SM_SLUG_OKSU }}
      SM_SLUG_GWANGGYO: ${{ secrets.SM_SLUG_GWANGGYO }}
      SM_SLUG_BANPO: ${{ secrets.SM_SLUG_BANPO }}
      SM_SLUG_PANGYO: ${{ secrets.SM_SLUG_PANGYO }}
      SM_SLUG_SONGPA: ${{ secrets.SM_SLUG_SONGPA }}
      # 수동 실행 시 입력값, 스케줄 실행 시 false(반영)
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run daily update
        run: node automation/run.mjs
