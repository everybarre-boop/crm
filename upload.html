<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>에블바레 회원 데이터 업로드</title>
<script src="xlsx.full.min.js"></script>
<script src="supabase.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #e2e5ea;
    --primary: #4f6ef7;
    --primary-soft: #eef1ff;
    --text: #1f2430;
    --muted: #8a92a6;
    --danger: #e5484d;
    --success: #17845c;
    --success-soft: #e6f6ef;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .wrap { width: 100%; max-width: 820px; }
  header h1 { margin: 0 0 4px; font-size: 24px; }
  header p { margin: 0 0 28px; color: var(--muted); font-size: 14px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .drop {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop:hover { border-color: var(--primary); background: var(--primary-soft); }
  .drop.drag { border-color: var(--primary); background: var(--primary-soft); }
  .drop .icon { font-size: 40px; }
  .drop .big { font-size: 16px; font-weight: 600; margin: 12px 0 4px; }
  .drop .small { font-size: 13px; color: var(--muted); }
  input[type=file] { display: none; }

  .files { list-style: none; padding: 0; margin: 16px 0 0; }
  .files li {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 8px;
  }
  .files .name { font-weight: 600; font-size: 14px; }
  .files .meta { font-size: 12px; color: var(--muted); }
  .files .grow { flex: 1; min-width: 0; }
  .files .grow .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .remove {
    border: none; background: transparent; color: var(--danger);
    cursor: pointer; font-size: 13px; padding: 6px 8px; border-radius: 6px;
  }
  .remove:hover { background: #fdeaea; }

  .actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .btn {
    border: none; border-radius: 10px; padding: 12px 20px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn.primary { background: var(--primary); color: #fff; }
  .btn.primary:disabled { background: #b9c2e9; cursor: not-allowed; }
  .status { font-size: 13px; color: var(--muted); }

  .log { margin-top: 16px; font-size: 13px; }
  .log .line { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; }
  .log .ok { background: var(--success-soft); color: var(--success); }
  .log .err { background: #fdeaea; color: var(--danger); }
  .log .info { background: #f1f3f7; color: var(--text); }

  .setup { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .setup code { background: #f1f3f7; padding: 1px 6px; border-radius: 5px; font-size: 12px; }
  .warn { color: var(--danger); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>에블바레 회원 데이터 업로드</h1>
    <p>엑셀(.xlsx, .xls) · CSV 파일을 올리면 Supabase <code style="font-size:12px">members</code> 테이블에 반영됩니다.<br>
      같은 회원·수강권은 <strong>중복 없이 갱신(upsert)</strong>되고, 잔여·예약가능·취소가능 횟수는 최신 값으로 업데이트됩니다.</p>
  </header>

  <div class="card">
    <label class="drop" id="drop">
      <div class="icon">📁</div>
      <div class="big">여기로 파일을 끌어다 놓으세요</div>
      <div class="small">또는 클릭해서 파일 선택 · XLSX, XLS, CSV 지원</div>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,text/csv" multiple />
    </label>
    <ul class="files" id="fileList"></ul>

    <div class="actions">
      <button class="btn primary" id="saveBtn" disabled>Supabase에 저장</button>
      <span class="status" id="status">저장할 파일을 먼저 올려주세요.</span>
    </div>

    <div class="log" id="log"></div>
  </div>

  <div class="card">
    <div class="setup" id="setupBox">
      <strong>⚙️ 연결 설정</strong><br>
      아래 스크립트 상단의 <code>SUPABASE_ANON_KEY</code> 값에 anon public 키를 붙여넣어야 저장이 됩니다.
      (Supabase → Project Settings → API → <code>anon public</code>)
    </div>
  </div>
</div>

<script>
  /* ======================================================================
     ⚙️ 연결 설정 — 여기 두 값만 확인하세요
     URL은 이미 넣어두었습니다. anon 키만 붙여넣으면 됩니다.
     ====================================================================== */
  const SUPABASE_URL = 'https://jxsdopvxtzpbyxxctcem.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4c2RvcHZ4dHpwYnl4eGN0Y2VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjI3NDcsImV4cCI6MjA5ODgzODc0N30.5Uqa_RO1MxQw0CuEI2pMlTuD6zJm8NGbHoVeroFjXgI'
  ;
  /* ====================================================================== */

  // 엑셀 헤더 → DB 컬럼 매핑 (공백/줄바꿈 무시하고 매칭)
  // 실제 엑셀 헤더와 동일한 이름으로 각 컬럼에 저장합니다.
  const COLUMN_MAP = {
    '이름': '이름',
    '성별': '성별',
    '등록일': '등록일',
    '생년월일': '생년월일',
    '수강권명': '수강권명',
    '수강권종류': '수강권종류',
    '결제구분': '결제구분',
    '결제금액': '결제금액',
    '결제방법': '결제방법',
    '결제일시': '결제일시',
    '할부개월수': '할부개월수',
    '잔여횟수': '잔여횟수',
    '전체횟수': '전체횟수',
    '예약가능횟수': '예약가능횟수',
    '취소가능횟수': '취소가능횟수',
    '수강권시작일': '수강권시작일',
    '수강권종료일': '수강권종료일',
  };

  /* 중복 판단(고유) 키 — "변하지 않는 구매 속성"으로 구성.
     재업로드 시 이 값들이 같으면 같은 행으로 보고,
     잔여횟수·예약가능횟수·취소가능횟수만 최신 값으로 갱신(update)합니다.
     ※ 여기 컬럼을 바꾸면 아래 SQL의 unique 인덱스 기준도 함께 바꿔야 합니다. */
  const KEY_COLS = [
    '이름', '성별', '등록일', '생년월일', '수강권명', '수강권종류',
    '결제구분', '결제금액', '결제방법', '결제일시',
    '할부개월수', '전체횟수', '수강권시작일', '수강권종료일',
  ];
  const KEY_SEP = String.fromCharCode(31); // 데이터에 나오지 않는 구분자(Unit Separator)

  // 레코드 → 고유 키 문자열 (DB의 dedup_key 컬럼에 그대로 저장)
  function makeKey(rec) {
    return KEY_COLS.map(c => (rec[c] == null ? '' : String(rec[c]))).join(KEY_SEP);
  }

  const drop = document.getElementById('drop');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const saveBtn = document.getElementById('saveBtn');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');

  let files = [];
  let sb = null;

  // Supabase 클라이언트 초기화
  if (SUPABASE_ANON_KEY.startsWith('eyJ')) {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } else {
    document.getElementById('setupBox').innerHTML =
      '<strong class="warn">⚠️ anon 키가 아직 설정되지 않았습니다.</strong><br>' +
      '이 HTML 파일을 편집기로 열어 <code>SUPABASE_ANON_KEY</code> 값에 ' +
      'anon public 키(<code>eyJ...</code>)를 붙여넣고 저장한 뒤 새로고침하세요.';
  }

  // 드래그 앤 드롭
  ['dragenter', 'dragover'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
  drop.addEventListener('drop', e => addFiles(e.dataTransfer.files));
  fileInput.addEventListener('change', e => addFiles(e.target.files));
  saveBtn.addEventListener('click', saveAll);

  function addFiles(fileListObj) {
    for (const f of fileListObj) files.push(f);
    fileInput.value = '';
    render();
  }

  function removeFile(i) { files.splice(i, 1); render(); }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function render() {
    fileList.innerHTML = '';
    files.forEach((f, i) => {
      const li = document.createElement('li');
      const ext = (f.name.split('.').pop() || '').toUpperCase();
      li.innerHTML = `
        <span>📄</span>
        <div class="grow">
          <div class="name">${escapeHtml(f.name)}</div>
          <div class="meta">${ext} · ${formatSize(f.size)}</div>
        </div>
        <button class="remove" data-i="${i}">삭제</button>`;
      li.querySelector('.remove').addEventListener('click', () => removeFile(i));
      fileList.appendChild(li);
    });
    const ready = files.length > 0 && !!sb;
    saveBtn.disabled = !ready;
    statusEl.textContent = files.length === 0
      ? '저장할 파일을 먼저 올려주세요.'
      : (sb ? `${files.length}개 파일 준비됨.` : 'anon 키 설정 후 저장할 수 있어요.');
  }

  function log(msg, kind = 'info') {
    const div = document.createElement('div');
    div.className = 'line ' + kind;
    div.innerHTML = msg;
    logEl.appendChild(div);
  }

  // 파일 하나를 읽어 [{컬럼:값}, ...] 행 배열로 변환
  function readRows(f) {
    return new Promise((resolve, reject) => {
      const name = f.name.toLowerCase();
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('파일을 읽지 못했습니다.'));
      reader.onload = e => {
        try {
          let wb;
          if (name.endsWith('.csv')) {
            wb = XLSX.read(e.target.result, { type: 'string' });
          } else {
            wb = XLSX.read(e.target.result, { type: 'array' });
          }
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws, { raw: false, defval: '' });
          resolve(json);
        } catch (err) { reject(err); }
      };
      if (name.endsWith('.csv')) reader.readAsText(f, 'utf-8');
      else reader.readAsArrayBuffer(f);
    });
  }

  const norm = s => String(s).replace(/\s+/g, '').trim();

  // 엑셀 원본 행 → members 테이블 레코드로 변환
  function toRecord(row) {
    const rec = { raw: row };
    for (const key in row) {
      const dbCol = COLUMN_MAP[norm(key)];
      if (dbCol) rec[dbCol] = row[key] === '' ? null : String(row[key]);
    }
    rec.dedup_key = makeKey(rec); // upsert 충돌 판단용 고유 키
    return rec;
  }

  // 같은 dedup_key를 가진 행을 하나로 합침(마지막 값 우선).
  // → 한 번의 upsert 요청 안에 중복 키가 없어야 DB 오류가 안 남.
  function dedupeByKey(records) {
    const map = new Map();
    for (const rec of records) map.set(rec.dedup_key, rec);
    return [...map.values()];
  }

  async function saveAll() {
    if (!sb) return;
    saveBtn.disabled = true;
    logEl.innerHTML = '';
    let totalSaved = 0, totalFail = 0;

    for (const f of files) {
      try {
        const rows = await readRows(f);
        if (!rows.length) { log(`⏭️ ${escapeHtml(f.name)} — 데이터 행이 없습니다.`, 'info'); continue; }
        const rawCount = rows.length;
        const records = dedupeByKey(rows.map(toRecord));
        const merged = rawCount - records.length;

        // 500행씩 나눠서 upsert (dedup_key 기준: 있으면 갱신, 없으면 추가)
        const CHUNK = 500;
        let saved = 0;
        for (let i = 0; i < records.length; i += CHUNK) {
          const batch = records.slice(i, i + CHUNK);
          const { error } = await sb
            .from('members')
            .upsert(batch, { onConflict: 'dedup_key' });
          if (error) throw error;
          saved += batch.length;
          statusEl.textContent = `${escapeHtml(f.name)} 저장 중… ${saved}/${records.length}`;
        }
        totalSaved += saved;
        log(`✅ ${escapeHtml(f.name)} — ${saved}행 반영 완료`
          + (merged > 0 ? ` (파일 내 중복 ${merged}행 합침)` : ''), 'ok');
      } catch (err) {
        totalFail++;
        log(`❌ ${escapeHtml(f.name)} — 저장 실패: ${escapeHtml(err.message || String(err))}`, 'err');
      }
    }

    statusEl.textContent = `완료 — 총 ${totalSaved}행 저장${totalFail ? `, ${totalFail}개 파일 실패` : ''}.`;
    saveBtn.disabled = files.length === 0;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
</script>
</body>
</html>
