<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>에블바레 관리자</title>
<script src="xlsx.full.min.js"></script>
<script src="supabase.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #e2e5ea;
    --primary: #4f6ef7;
    --primary-soft: #eef1ff;
    --text: #1f2430;
    --muted: #8a92a6;
    --danger: #e5484d;
    --danger-soft: #fdeaea;
    --success: #17845c;
    --success-soft: #e6f6ef;
    --sidebar: #1f2430;
    --sidebar-muted: #9aa3b8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  button { font-family: inherit; }

  /* ---------- 로그인 ---------- */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 32px; width: 100%; max-width: 380px;
  }
  .login-card h1 { margin: 0 0 4px; font-size: 22px; }
  .login-card p { margin: 0 0 24px; color: var(--muted); font-size: 13px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none;
  }
  .field input:focus { border-color: var(--primary); }

  .btn {
    border: none; border-radius: 10px; padding: 11px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn.primary { background: var(--primary); color: #fff; width: 100%; }
  .btn.primary:disabled { background: #b9c2e9; cursor: not-allowed; }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn.ghost:hover { background: #f1f3f7; }
  .btn.small { padding: 7px 12px; font-size: 13px; }
  .btn.danger { background: var(--danger); color: #fff; }
  .btn.danger-ghost { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn.danger-ghost:hover { background: var(--danger-soft); }

  .auth-msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .auth-msg.err { color: var(--danger); }
  .auth-msg.ok { color: var(--success); }

  /* ---------- 앱 레이아웃 ---------- */
  .app { display: none; min-height: 100vh; grid-template-columns: 240px 1fr; }
  .app.on { display: grid; }

  .sidebar {
    background: var(--sidebar); color: #fff; padding: 22px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .brand { padding: 6px 10px 18px; }
  .brand .logo { font-size: 17px; font-weight: 700; }
  .brand .sub { font-size: 12px; color: var(--sidebar-muted); margin-top: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border-radius: 10px; cursor: pointer;
    color: var(--sidebar-muted); font-size: 14px; font-weight: 500;
    border: none; background: transparent; text-align: left; width: 100%;
  }
  .nav-item .ic { font-size: 16px; width: 20px; text-align: center; }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active { background: var(--primary); color: #fff; }
  .sidebar .spacer { flex: 1; }
  .sidebar .user {
    font-size: 12px; color: var(--sidebar-muted); padding: 8px 12px;
    border-top: 1px solid rgba(255,255,255,.08); margin-top: 8px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .main { padding: 32px 36px; overflow: auto; }
  .page-head { margin-bottom: 22px; }
  .page-head h2 { margin: 0 0 4px; font-size: 22px; }
  .page-head p { margin: 0; color: var(--muted); font-size: 13px; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px; margin-bottom: 18px;
  }

  /* ---------- 통계 카드 ---------- */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px;
  }
  .stat .label { font-size: 13px; color: var(--muted); }
  .stat .value { font-size: 28px; font-weight: 700; margin-top: 6px; }
  .stat .value.small { font-size: 22px; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 13px; }
  .bar-row .bl { width: 140px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; background: #eef1f6; border-radius: 6px; height: 20px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--primary); border-radius: 6px; }
  .bar-row .bv { width: 70px; text-align: right; flex-shrink: 0; color: var(--muted); }

  /* ---------- 테이블 ---------- */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .toolbar input.search {
    flex: 1; min-width: 200px; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none;
  }
  .toolbar input.search:focus { border-color: var(--primary); }
  .toolbar select {
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: #fff;
  }

  .table-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; white-space: nowrap; }
  thead th {
    background: #f7f8fa; text-align: left; padding: 11px 12px; font-weight: 600;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; cursor: pointer; user-select: none;
  }
  thead th.noSort { cursor: default; }
  thead th .arrow { color: var(--primary); font-size: 11px; }
  tbody td { padding: 10px 12px; border-bottom: 1px solid #eef0f4; }
  tbody tr:hover { background: #fafbfc; }
  tbody tr:last-child td { border-bottom: none; }
  .row-actions { display: flex; gap: 6px; }

  .pager { display: flex; align-items: center; gap: 12px; margin-top: 14px; font-size: 13px; color: var(--muted); }
  .pager .grow { flex: 1; }

  /* ---------- 모달 ---------- */
  .modal-back {
    position: fixed; inset: 0; background: rgba(20,24,33,.45);
    display: none; align-items: center; justify-content: center; padding: 24px; z-index: 50;
  }
  .modal-back.on { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 560px;
    max-height: 88vh; overflow: auto;
  }
  .modal h3 { margin: 0 0 16px; font-size: 18px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-grid .field { margin: 0; }
  .modal-grid .field.full { grid-column: 1 / -1; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* ---------- 업로드(드롭존) ---------- */
  .drop {
    border: 2px dashed var(--border); border-radius: 12px; padding: 40px 24px;
    text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .drop:hover, .drop.drag { border-color: var(--primary); background: var(--primary-soft); }
  .drop .icon { font-size: 36px; }
  .drop .big { font-size: 15px; font-weight: 600; margin: 10px 0 4px; }
  .drop .small { font-size: 13px; color: var(--muted); }
  input[type=file] { display: none; }
  .files { list-style: none; padding: 0; margin: 14px 0 0; }
  .files li {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
  }
  .files .grow { flex: 1; min-width: 0; }
  .files .name { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .files .meta { font-size: 12px; color: var(--muted); }
  .remove { border: none; background: transparent; color: var(--danger); cursor: pointer; font-size: 13px; padding: 6px 8px; border-radius: 6px; }
  .remove:hover { background: var(--danger-soft); }
  .log { margin-top: 14px; font-size: 13px; }
  .log .line { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; }
  .log .ok { background: var(--success-soft); color: var(--success); }
  .log .err { background: var(--danger-soft); color: var(--danger); }
  .log .info { background: #f1f3f7; color: var(--text); }

  .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }
  .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid #d3d8e2; border-top-color: var(--primary); border-radius: 50%; animation: sp .7s linear infinite; vertical-align: -3px; }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* ---------- 토스트 ---------- */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1f2430; color: #fff; padding: 12px 18px; border-radius: 10px;
    font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 100;
  }
  #toast.on { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  #toast.err { background: var(--danger); }

  @media (max-width: 720px) {
    .app.on { grid-template-columns: 1fr; }
    .sidebar { flex-direction: row; overflow-x: auto; padding: 10px; }
    .sidebar .brand, .sidebar .spacer, .sidebar .user { display: none; }
    .main { padding: 20px 16px; }
    .modal-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ================= 로그인 화면 ================= -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>에블바레 관리자</h1>
    <p>관리자 계정으로 로그인하세요.</p>
    <form id="loginForm">
      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button class="btn primary" id="loginBtn" type="submit">로그인</button>
      <div class="auth-msg" id="authMsg"></div>
    </form>
  </div>
</div>

<!-- ================= 앱 화면 ================= -->
<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">에블바레</div>
      <div class="sub">관리자 콘솔</div>
    </div>
    <nav id="nav"></nav>
    <div class="spacer"></div>
    <div class="user" id="userBox"></div>
    <button class="nav-item" id="logoutBtn"><span class="ic">↩</span> 로그아웃</button>
  </aside>
  <main class="main" id="main"></main>
</div>

<!-- 모달 / 토스트 -->
<div class="modal-back" id="modalBack">
  <div class="modal" id="modal"></div>
</div>
<div id="toast"></div>

<script>
/* ======================================================================
   ⚙️ 연결 설정
   · SUPABASE_ANON_KEY 는 브라우저에 노출되는 '공개 키'다. (설계상 정상)
   · 회원 데이터 보호는 오직 Supabase RLS 정책으로만 이뤄진다.
     → members 테이블 정책은 반드시 'authenticated + 관리자 이메일'로 제한할 것.
       (anon 역할에 select/insert 를 열어두면 로그인 없이 전 PII가 노출된다.)
   ====================================================================== */
const SUPABASE_URL = 'https://jxsdopvxtzpbyxxctcem.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4c2RvcHZ4dHpwYnl4eGN0Y2VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjI3NDcsImV4cCI6MjA5ODgzODc0N30.5Uqa_RO1MxQw0CuEI2pMlTuD6zJm8NGbHoVeroFjXgI';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ======================================================================
   공통 상수 (members 테이블 스키마)
   ====================================================================== */
const TABLE = 'members';

// 화면·수정에서 다루는 컬럼 (엑셀 헤더 = DB 컬럼)
const COLUMNS = [
  '이름', '성별', '등록일', '생년월일', '수강권명', '수강권종류',
  '결제구분', '결제금액', '결제방법', '결제일시', '할부개월수',
  '잔여횟수', '전체횟수', '예약가능횟수', '취소가능횟수',
  '수강권시작일', '수강권종료일',
];

// upsert 충돌 판단용 고유 키 구성. KEY_COLS 변경 시 DB unique 인덱스도 함께 변경할 것.
const KEY_COLS = [
  '이름', '성별', '등록일', '생년월일', '수강권명', '수강권종류',
  '결제구분', '결제금액', '결제방법', '결제일시',
  '할부개월수', '전체횟수', '수강권시작일', '수강권종료일',
];
const KEY_SEP = String.fromCharCode(31);
function makeKey(rec) {
  return KEY_COLS.map(c => (rec[c] == null ? '' : String(rec[c]))).join(KEY_SEP);
}

// 검색 대상 컬럼 (ilike)
const SEARCH_COLS = ['이름', '수강권명', '수강권종류', '성별'];
// 잔여/예약가능/취소가능 횟수는 업로드로 갱신되는 "변하는 값"이라
// 수정 모달에서 손으로 못 바꾸게 읽기 전용으로 둔다. (나머지는 편집 가능)
const READONLY = new Set(['잔여횟수', '예약가능횟수', '취소가능횟수']);
const EDITABLE = new Set(COLUMNS.filter(c => !READONLY.has(c)));

/* ======================================================================
   유틸
   ====================================================================== */
const $ = sel => document.querySelector(sel);
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
let toastTimer;
function toast(msg, kind = '') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'on ' + kind;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = kind; }, 2600);
}
function fmtNum(n) {
  if (n == null || n === '' || isNaN(Number(n))) return n ?? '';
  return Number(n).toLocaleString('ko-KR');
}

// 여러 컬럼만 골라 전체 행을 페이지 단위로 가져오기 (통계용)
async function fetchAllRows(select, cap = 50000) {
  const PAGE = 1000;
  let from = 0, out = [];
  while (from < cap) {
    const { data, error } = await sb.from(TABLE).select(select).range(from, from + PAGE - 1);
    if (error) throw error;
    if (!data || !data.length) break;
    out = out.concat(data);
    if (data.length < PAGE) break;
    from += PAGE;
  }
  return out;
}

/* ======================================================================
   모달 헬퍼
   ====================================================================== */
function openModal(html) {
  $('#modal').innerHTML = html;
  $('#modalBack').classList.add('on');
}
function closeModal() { $('#modalBack').classList.remove('on'); }
$('#modalBack').addEventListener('click', e => { if (e.target.id === 'modalBack') closeModal(); });

/* ======================================================================
   카테고리 레지스트리
   ── 새 카테고리 추가법:
      CATEGORIES 배열에 { id, label, icon, render } 객체를 하나 추가하면 끝.
      render(main, ctx) 안에서 화면을 그리면 됩니다. (ctx = { sb, user })
   ====================================================================== */
const CATEGORIES = [];
function registerCategory(cat) { CATEGORIES.push(cat); }

/* -------------------- 1) 대시보드 -------------------- */
registerCategory({
  id: 'dashboard',
  label: '대시보드',
  icon: '📊',
  async render(main) {
    main.innerHTML = `
      <div class="page-head"><h2>대시보드</h2><p>회원 데이터 요약 통계</p></div>
      <div id="dashBody"><div class="empty"><span class="spin"></span> 통계를 불러오는 중…</div></div>`;

    try {
      const { count: total, error: cErr } = await sb.from(TABLE).select('*', { count: 'exact', head: true });
      if (cErr) throw cErr;

      const rows = await fetchAllRows('이름,생년월일,성별,수강권종류,결제금액,등록일');

      // 고유 회원 수 (이름 + 생년월일)
      const memberSet = new Set(rows.map(r => (r['이름'] || '') + '|' + (r['생년월일'] || '')));
      // 결제금액 합계
      const paySum = rows.reduce((s, r) => s + (Number(String(r['결제금액'] ?? '').replace(/[^0-9.-]/g, '')) || 0), 0);
      // 수강권종류 분포
      const byType = countBy(rows, '수강권종류');
      // 성별 분포
      const byGender = countBy(rows, '성별');

      $('#dashBody').innerHTML = `
        <div class="stat-grid">
          <div class="stat"><div class="label">전체 레코드</div><div class="value">${fmtNum(total)}</div></div>
          <div class="stat"><div class="label">고유 회원 수</div><div class="value">${fmtNum(memberSet.size)}</div></div>
          <div class="stat"><div class="label">결제금액 합계</div><div class="value small">${fmtNum(paySum)}원</div></div>
          <div class="stat"><div class="label">수강권 종류</div><div class="value">${fmtNum(Object.keys(byType).length)}</div></div>
        </div>
        <div class="card">
          <h3 style="margin:0 0 14px;font-size:15px;">수강권 종류별 분포</h3>
          ${barChart(byType)}
        </div>
        <div class="card">
          <h3 style="margin:0 0 14px;font-size:15px;">성별 분포</h3>
          ${barChart(byGender)}
        </div>
        <p style="font-size:12px;color:var(--muted);">※ 분포·합계는 최근 최대 50,000행 기준입니다.</p>`;
    } catch (err) {
      $('#dashBody').innerHTML = `<div class="empty">통계를 불러오지 못했습니다: ${escapeHtml(err.message || err)}</div>`;
    }
  }
});

function countBy(rows, col) {
  const m = {};
  for (const r of rows) { const k = r[col] || '(없음)'; m[k] = (m[k] || 0) + 1; }
  return m;
}
function barChart(map) {
  const entries = Object.entries(map).sort((a, b) => b[1] - a[1]);
  if (!entries.length) return '<div class="empty">데이터 없음</div>';
  const max = entries[0][1];
  return entries.map(([k, v]) => `
    <div class="bar-row">
      <div class="bl" title="${escapeHtml(k)}">${escapeHtml(k)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v / max * 100).toFixed(1)}%"></div></div>
      <div class="bv">${fmtNum(v)}</div>
    </div>`).join('');
}

/* -------------------- 2) 회원 관리 (조회/검색/수정/삭제) -------------------- */
registerCategory({
  id: 'members',
  label: '회원 관리',
  icon: '👥',
  render(main) {
    const state = { page: 0, size: 50, q: '', sort: '등록일', dir: false, total: 0, rows: [] };
    let loadSeq = 0; // 동시 load() 경쟁 방지: 낡은 응답이 최신 결과를 덮어쓰지 않게 함
    main.innerHTML = `
      <div class="page-head"><h2>회원 관리</h2><p>검색·정렬 후 각 행을 수정하거나 삭제할 수 있습니다.</p></div>
      <div class="toolbar">
        <input class="search" id="mSearch" placeholder="이름 · 수강권명 · 종류 · 성별 검색" />
        <select id="mSize">
          <option value="25">25개씩</option>
          <option value="50" selected>50개씩</option>
          <option value="100">100개씩</option>
        </select>
      </div>
      <div class="table-scroll"><table>
        <thead><tr id="mHead"></tr></thead>
        <tbody id="mBody"></tbody>
      </table></div>
      <div class="pager">
        <span id="mCount"></span><span class="grow"></span>
        <button class="btn ghost small" id="mPrev">이전</button>
        <span id="mPageInfo"></span>
        <button class="btn ghost small" id="mNext">다음</button>
      </div>`;

    // 헤더 (정렬 가능)
    function renderHead() {
      $('#mHead').innerHTML =
        COLUMNS.map(c => {
          const arrow = state.sort === c ? `<span class="arrow">${state.dir ? '▲' : '▼'}</span>` : '';
          return `<th data-col="${escapeHtml(c)}">${escapeHtml(c)} ${arrow}</th>`;
        }).join('') + '<th class="noSort">관리</th>';
      $('#mHead').querySelectorAll('th[data-col]').forEach(th =>
        th.addEventListener('click', () => {
          const c = th.dataset.col;
          if (state.sort === c) state.dir = !state.dir; else { state.sort = c; state.dir = false; }
          state.page = 0; load();
        }));
    }

    async function load() {
      const seq = ++loadSeq;
      $('#mBody').innerHTML = `<tr><td colspan="${COLUMNS.length + 1}"><div class="empty"><span class="spin"></span> 불러오는 중…</div></td></tr>`;
      try {
        let query = sb.from(TABLE).select('*', { count: 'exact' });
        if (state.q.trim()) {
          // PostgREST or() 필터 인젝션 방지:
          // .or()는 문자열을 필터 구문으로 파싱하므로, 구문에 의미가 있는
          // 특수문자( , . : ( ) " ' \ % * )를 검색어에서 모두 제거한다.
          const term = state.q.trim().replace(/[,.:()"'\\%*]/g, ' ').trim();
          if (term) {
            query = query.or(SEARCH_COLS.map(c => `${c}.ilike.%${term}%`).join(','));
          }
        }
        query = query.order(state.sort, { ascending: state.dir, nullsFirst: false })
                     .range(state.page * state.size, state.page * state.size + state.size - 1);
        const { data, count, error } = await query;
        if (seq !== loadSeq) return; // 더 새 load()가 시작됨 → 이 낡은 응답은 버린다
        if (error) throw error;
        state.rows = data || []; state.total = count || 0;
        renderRows();
      } catch (err) {
        if (seq !== loadSeq) return;
        $('#mBody').innerHTML = `<tr><td colspan="${COLUMNS.length + 1}"><div class="empty">불러오기 실패: ${escapeHtml(err.message || err)}</div></td></tr>`;
      }
    }

    function renderRows() {
      if (!state.rows.length) {
        $('#mBody').innerHTML = `<tr><td colspan="${COLUMNS.length + 1}"><div class="empty">결과가 없습니다.</div></td></tr>`;
      } else {
        $('#mBody').innerHTML = state.rows.map((r, i) => {
          const tds = COLUMNS.map(c => {
            const numCol = ['결제금액','잔여횟수','전체횟수','예약가능횟수','취소가능횟수','할부개월수'].includes(c);
            return `<td>${escapeHtml(numCol ? fmtNum(r[c]) : r[c])}</td>`;
          }).join('');
          return `<tr>${tds}<td><div class="row-actions">
            <button class="btn ghost small" data-edit="${i}">수정</button>
            <button class="btn danger-ghost small" data-del="${i}">삭제</button>
          </div></td></tr>`;
        }).join('');
        $('#mBody').querySelectorAll('[data-edit]').forEach(b =>
          b.addEventListener('click', () => editRow(state.rows[+b.dataset.edit])));
        $('#mBody').querySelectorAll('[data-del]').forEach(b =>
          b.addEventListener('click', () => delRow(state.rows[+b.dataset.del])));
      }
      const start = state.total ? state.page * state.size + 1 : 0;
      const end = Math.min((state.page + 1) * state.size, state.total);
      $('#mCount').textContent = `총 ${fmtNum(state.total)}건`;
      $('#mPageInfo').textContent = `${fmtNum(start)}–${fmtNum(end)}`;
      $('#mPrev').disabled = state.page === 0;
      $('#mNext').disabled = end >= state.total;
    }

    // 수정 모달
    function editRow(row) {
      const origKey = row.dedup_key ?? makeKey(row);
      const fields = COLUMNS.map(c => `
        <div class="field ${['수강권명'].includes(c) ? 'full' : ''}">
          <label>${escapeHtml(c)}</label>
          <input data-f="${escapeHtml(c)}" value="${escapeHtml(row[c])}" ${EDITABLE.has(c) ? '' : 'disabled'} />
        </div>`).join('');
      openModal(`
        <h3>회원 정보 수정</h3>
        <div class="modal-grid">${fields}</div>
        <div class="modal-foot">
          <button class="btn ghost" id="mCancel">취소</button>
          <button class="btn primary" id="mSave" style="width:auto;">저장</button>
        </div>`);
      $('#mCancel').addEventListener('click', closeModal);
      $('#mSave').addEventListener('click', async () => {
        const btn = $('#mSave'); btn.disabled = true; btn.textContent = '저장 중…';
        const patch = {};
        $('#modal').querySelectorAll('input[data-f]').forEach(inp => {
          const v = inp.value.trim();
          patch[inp.dataset.f] = v === '' ? null : v;
        });
        patch.dedup_key = makeKey(patch); // 키 컬럼이 바뀌면 dedup_key도 재계산
        try {
          const { error } = await sb.from(TABLE).update(patch).eq('dedup_key', origKey);
          if (error) throw error;
          closeModal(); toast('수정되었습니다.'); load();
        } catch (err) {
          btn.disabled = false; btn.textContent = '저장';
          toast('수정 실패: ' + (err.message || err), 'err');
        }
      });
    }

    // 삭제
    function delRow(row) {
      const origKey = row.dedup_key ?? makeKey(row);
      openModal(`
        <h3>삭제 확인</h3>
        <p style="font-size:14px;color:var(--text);margin:0 0 4px;">
          <strong>${escapeHtml(row['이름'])}</strong> · ${escapeHtml(row['수강권명'])}</p>
        <p style="font-size:13px;color:var(--muted);margin:0;">이 레코드를 삭제하시겠습니까? 되돌릴 수 없습니다.</p>
        <div class="modal-foot">
          <button class="btn ghost" id="dCancel">취소</button>
          <button class="btn danger" id="dOk" style="width:auto;">삭제</button>
        </div>`);
      $('#dCancel').addEventListener('click', closeModal);
      $('#dOk').addEventListener('click', async () => {
        const btn = $('#dOk'); btn.disabled = true; btn.textContent = '삭제 중…';
        try {
          const { error } = await sb.from(TABLE).delete().eq('dedup_key', origKey);
          if (error) throw error;
          closeModal(); toast('삭제되었습니다.'); load();
        } catch (err) {
          btn.disabled = false; btn.textContent = '삭제';
          toast('삭제 실패: ' + (err.message || err), 'err');
        }
      });
    }

    // 이벤트 바인딩
    let searchTimer;
    $('#mSearch').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { state.q = e.target.value; state.page = 0; load(); }, 300);
    });
    $('#mSize').addEventListener('change', e => { state.size = +e.target.value; state.page = 0; load(); });
    $('#mPrev').addEventListener('click', () => { if (state.page > 0) { state.page--; load(); } });
    $('#mNext').addEventListener('click', () => { state.page++; load(); });

    renderHead(); load();
  }
});

/* -------------------- 3) 업로드 (엑셀/CSV → members upsert) -------------------- */
registerCategory({
  id: 'upload',
  label: '데이터 업로드',
  icon: '⬆️',
  render(main) {
    main.innerHTML = `
      <div class="page-head"><h2>데이터 업로드</h2>
        <p>엑셀(.xlsx, .xls) · CSV 를 올리면 <code>members</code> 테이블에 upsert 됩니다. 같은 수강권은 중복 없이 갱신됩니다.</p></div>
      <div class="card">
        <label class="drop" id="drop">
          <div class="icon">📁</div>
          <div class="big">여기로 파일을 끌어다 놓으세요</div>
          <div class="small">또는 클릭해서 선택 · XLSX, XLS, CSV</div>
          <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,text/csv" multiple />
        </label>
        <ul class="files" id="fileList"></ul>
        <div class="toolbar" style="margin-top:16px;">
          <button class="btn primary" id="saveBtn" style="width:auto;" disabled>Supabase에 저장</button>
          <span class="small" style="color:var(--muted);" id="uStatus">저장할 파일을 먼저 올려주세요.</span>
        </div>
        <div class="log" id="log"></div>
      </div>`;

    const COLUMN_MAP = {};
    COLUMNS.forEach(c => COLUMN_MAP[c] = c);

    let files = [];
    const drop = $('#drop'), fileInput = $('#fileInput'), fileList = $('#fileList');
    const saveBtn = $('#saveBtn'), statusEl = $('#uStatus'), logEl = $('#log');

    ['dragenter', 'dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
    ['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
    drop.addEventListener('drop', e => addFiles(e.dataTransfer.files));
    fileInput.addEventListener('change', e => addFiles(e.target.files));
    saveBtn.addEventListener('click', saveAll);

    function addFiles(list) { for (const f of list) files.push(f); fileInput.value = ''; render(); }
    function removeFile(i) { files.splice(i, 1); render(); }
    function formatSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }
    function render() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const li = document.createElement('li');
        const ext = (f.name.split('.').pop() || '').toUpperCase();
        li.innerHTML = `<span>📄</span><div class="grow"><div class="name">${escapeHtml(f.name)}</div>
          <div class="meta">${escapeHtml(ext)} · ${formatSize(f.size)}</div></div><button class="remove">삭제</button>`;
        li.querySelector('.remove').addEventListener('click', () => removeFile(i));
        fileList.appendChild(li);
      });
      saveBtn.disabled = files.length === 0;
      statusEl.textContent = files.length === 0 ? '저장할 파일을 먼저 올려주세요.' : `${files.length}개 파일 준비됨.`;
    }
    function log(msg, kind = 'info') {
      const d = document.createElement('div'); d.className = 'line ' + kind; d.innerHTML = msg; logEl.appendChild(d);
    }
    const norm = s => String(s).replace(/\s+/g, '').trim();

    function readRows(f) {
      return new Promise((resolve, reject) => {
        const name = f.name.toLowerCase(), reader = new FileReader();
        reader.onerror = () => reject(new Error('파일을 읽지 못했습니다.'));
        reader.onload = e => {
          try {
            const wb = name.endsWith('.csv')
              ? XLSX.read(e.target.result, { type: 'string' })
              : XLSX.read(e.target.result, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            resolve(XLSX.utils.sheet_to_json(ws, { raw: false, defval: '' }));
          } catch (err) { reject(err); }
        };
        if (name.endsWith('.csv')) reader.readAsText(f, 'utf-8'); else reader.readAsArrayBuffer(f);
      });
    }
    function toRecord(row) {
      const rec = { raw: row };
      for (const key in row) { const col = COLUMN_MAP[norm(key)]; if (col) rec[col] = row[key] === '' ? null : String(row[key]); }
      rec.dedup_key = makeKey(rec);
      return rec;
    }
    function dedupeByKey(records) {
      const map = new Map();
      for (const rec of records) map.set(rec.dedup_key, rec);
      return [...map.values()];
    }

    async function saveAll() {
      saveBtn.disabled = true; logEl.innerHTML = '';
      let totalSaved = 0, totalFail = 0;
      for (const f of files) {
        try {
          const rows = await readRows(f);
          if (!rows.length) { log(`⏭️ ${escapeHtml(f.name)} — 데이터 행이 없습니다.`); continue; }
          const rawCount = rows.length;
          const records = dedupeByKey(rows.map(toRecord));
          const merged = rawCount - records.length;
          const CHUNK = 500; let saved = 0;
          for (let i = 0; i < records.length; i += CHUNK) {
            const batch = records.slice(i, i + CHUNK);
            const { error } = await sb.from(TABLE).upsert(batch, { onConflict: 'dedup_key' });
            if (error) throw error;
            saved += batch.length;
            statusEl.textContent = `${f.name} 저장 중… ${saved}/${records.length}`;
          }
          totalSaved += saved;
          log(`✅ ${escapeHtml(f.name)} — ${saved}행 반영 완료` + (merged > 0 ? ` (파일 내 중복 ${merged}행 합침)` : ''), 'ok');
        } catch (err) {
          totalFail++; log(`❌ ${escapeHtml(f.name)} — 저장 실패: ${escapeHtml(err.message || String(err))}`, 'err');
        }
      }
      statusEl.textContent = `완료 — 총 ${totalSaved}행 저장${totalFail ? `, ${totalFail}개 실패` : ''}.`;
      saveBtn.disabled = files.length === 0;
    }
  }
});

/* ======================================================================
   내비게이션 & 라우팅
   ====================================================================== */
function buildNav() {
  $('#nav').innerHTML = CATEGORIES.map(c =>
    `<button class="nav-item" data-id="${c.id}"><span class="ic">${c.icon}</span> ${escapeHtml(c.label)}</button>`).join('');
  $('#nav').querySelectorAll('.nav-item').forEach(b =>
    b.addEventListener('click', () => { location.hash = b.dataset.id; }));
}

let currentUser = null;
function routeTo(id) {
  const cat = CATEGORIES.find(c => c.id === id) || CATEGORIES[0];
  $('#nav').querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.id === cat.id));
  cat.render($('#main'), { sb, user: currentUser });
}
window.addEventListener('hashchange', () => routeTo(location.hash.slice(1)));

/* ======================================================================
   인증
   ====================================================================== */
function showApp(user) {
  currentUser = user;
  $('#loginWrap').style.display = 'none';
  $('#app').classList.add('on');
  $('#userBox').textContent = user.email || '';
  buildNav();
  routeTo(location.hash.slice(1) || CATEGORIES[0].id);
}
function showLogin() {
  currentUser = null;
  $('#app').classList.remove('on');
  $('#loginWrap').style.display = 'flex';
}

$('#loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('#loginBtn'), msg = $('#authMsg');
  btn.disabled = true; btn.textContent = '로그인 중…'; msg.className = 'auth-msg'; msg.textContent = '';
  const { data, error } = await sb.auth.signInWithPassword({
    email: $('#email').value.trim(), password: $('#password').value,
  });
  btn.disabled = false; btn.textContent = '로그인';
  if (error) { msg.className = 'auth-msg err'; msg.textContent = '로그인 실패: ' + error.message; return; }
  showApp(data.user);
});

$('#logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); showLogin(); });

// 세션 복원
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) showApp(data.session.user); else showLogin();
})();
</script>
